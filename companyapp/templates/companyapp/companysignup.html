{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-5">
            <div class="card shadow-lg p-4">

                <h3 class="text-center mb-4">Create Account</h3>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST" action="{% url 'companyapp:companysignup' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Company Name</label>
                        <input type="text" name="companyname" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password1" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Confirm Password</label>
                        <input type="password" name="password2" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Industry Type</label>
                        <input type="text" name="industrytype" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label>Contact Number</label>
                        <input type="text" name="contact" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Company Location</label>
                        <textarea name="location" class="form-control" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Register
                    </button>
                </form>

                <div class="text-center mt-3">
                    <p>Already have an account? 
                        <a href="{% url 'companyapp:companylogin' %}">Login</a>
                    </p>
                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
