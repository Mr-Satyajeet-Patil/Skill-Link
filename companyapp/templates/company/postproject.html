{% extends 'base.html' %}
{% block content %}

<div class="container py-4">

    <h2>Post Project</h2>

    <div class="row">

        <!-- FORM -->
        <div class="col-md-5">
            <div class="card p-4 shadow-sm">

                <form method="POST">
                    {% csrf_token %}

                    <!-- Hidden ID for update/delete -->
                    <input type="hidden" name="id" id="project_id">

                    <input type="text" name="title" id="title"
                        class="form-control mb-2" placeholder="Title" required>

                    <textarea name="description" id="description"
                        class="form-control mb-2" placeholder="Description"></textarea>

                    <input type="text" name="requiredskills" id="skills"
                        class="form-control mb-2" placeholder="Skills">

                    <input type="number" name="budget" id="budget"
                        class="form-control mb-2" placeholder="Budget">

                    <input type="text" name="duration" id="duration"
                        class="form-control mb-2" placeholder="Duration">

                    <!-- BUTTONS -->
                    <div class="d-flex gap-2">
                        <button name="action" value="add" class="btn btn-success">Add</button>
                        <button name="action" value="update" class="btn btn-primary">Update</button>
                        <button name="action" value="delete" class="btn btn-danger">Delete</button>
                        <button type="reset" class="btn btn-secondary">Cancel</button>
                    </div>

                </form>
            </div>
        </div>

        <!-- TABLE -->
        <div class="col-md-7">
            <div class="card p-3 shadow-sm">

                <h4>Your Projects</h4>

                <table class="table table-bordered mt-3">
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Budget</th>
                        <th>Action</th>
                    </tr>

                    {% for p in projects %}
                    <tr>
                        <td>{{ p.id }}</td>
                        <td>{{ p.title }}</td>
                        <td>{{ p.budget }}</td>
                        <td>
                            <button class="btn btn-warning btn-sm"
                                onclick="editProject('{{ p.id }}','{{ p.title }}','{{ p.description }}','{{ p.requiredskills }}','{{ p.budget }}','{{ p.duration }}')">
                                Edit
                            </button>
                        </td>
                    </tr>
                    {% endfor %}

                </table>

            </div>
        </div>

    </div>
</div>

<!-- JS -->
<script>
function editProject(id, title, description, skills, budget, duration){
    document.getElementById("project_id").value = id;
    document.getElementById("title").value = title;
    document.getElementById("description").value = description;
    document.getElementById("skills").value = skills;
    document.getElementById("budget").value = budget;
    document.getElementById("duration").value = duration;
}
</script>

{% endblock %}
