{% extends "freelancer/freelancerpanel.html" %}

{% block contentfreelancer %}
<br><br><br><br>
<div style="max-width:50%;margin:auto;padding:20px;background:#0f172a;color:white;border-radius:10px;">
    
    <h2 style="text-align:center;">Manage Freelancer Profile</h2>

    <form method="POST" action="{% url 'freelancerapp:managefreelancer' %}">
        {% csrf_token %}
        
        {{ form.as_p }}

        <button type="submit" style="width:100%;padding:10px;background:#3b82f6;border:none;border-radius:5px;">
            Update Profile
        </button>
    </form>

</div>
{% endblock %}
